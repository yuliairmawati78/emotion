<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotion Journey</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ffd6e8,#e0c3fc,#c2f0ff);
background-size:300% 300%;
animation:gradientMove 12s infinite alternate;
}

@keyframes gradientMove{
0%{background-position:left;}
100%{background-position:right;}
}

/* JUDUL */
h1{
position:absolute;
top:30px;
left:50%;
transform:translateX(-50%);
font-size:56px;
font-weight:900;
letter-spacing:4px;
color:white;
text-transform:uppercase;
text-shadow:0 6px 18px rgba(0,0,0,0.25);
animation:floatTitle 3s ease-in-out infinite alternate;
}

@keyframes floatTitle{
0%{transform:translateX(-50%) translateY(0px);}
100%{transform:translateX(-50%) translateY(8px);}
}

/* MENU */
#menuBtn{
position:absolute;
top:40px;
left:30px;
padding:10px 20px;
border:none;
border-radius:25px;
background:white;
cursor:pointer;
font-weight:bold;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

#menuBox{
position:absolute;
top:90px;
left:30px;
display:none;
flex-direction:column;
gap:10px;
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

#menuBox button{
padding:8px;
border:none;
border-radius:10px;
background:#f3f3f3;
cursor:pointer;
}

/* BUBBLE */
.bubble{
position:absolute;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:10px;
font-weight:bold;
cursor:pointer;
opacity:0.85;
box-shadow:0 8px 15px rgba(0,0,0,0.15);
transition:transform 0.3s;
}

.bubble:hover{transform:scale(1.1);}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.card{
background:white;
padding:25px;
border-radius:20px;
width:320px;
display:flex;
flex-direction:column;
gap:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.card input,.card textarea,.card select{
padding:8px;
border-radius:8px;
border:1px solid #ddd;
}

.card button{
padding:8px;
border:none;
border-radius:10px;
background:#d8b4fe;
cursor:pointer;
}

.deleteBtn{
background:#ff9e9e !important;
}
</style>
</head>

<body>

<h1>Emotion Journey</h1>

<button id="menuBtn" onclick="toggleMenu()">☰ MENU</button>

<div id="menuBox">
<button onclick="openForm()">Tambah Catatan</button>
<button onclick="enterEditMode()">Edit / Hapus Catatan</button>
</div>

<!-- TAMBAH -->
<div id="formModal" class="modal">
<div class="card">
<h2>Tambah Catatan</h2>
<input type="text" id="judul" placeholder="Judul">
<textarea id="isi" placeholder="Isi catatan"></textarea>

<select id="level">
<option value="1">Level 1 – Peaceful | Tenang, stabil, damai</option>
<option value="2">Level 2 – Happy | Bahagia, nyaman, merasa dicintai</option>
<option value="3">Level 3 – Unsettled | Khawatir ringan, sedikit gelisah</option>
<option value="4">Level 4 – Sad | Sedih, kecewa, lelah emosional</option>
<option value="5">Level 5 – Stressed | Marah, tertekan, overwhelmed</option>
<option value="6">Level 6 – Breakdown | Sangat hancur, panik berat</option>
</select>

<select id="kategori">
<option value="Love">💖 Love</option>
<option value="Family">👨‍👩‍👧 Family</option>
<option value="Self">🌱 Self</option>
<option value="Life">🌍 Life</option>
</select>

<button onclick="saveNote()">Simpan</button>
<button onclick="closeForm()">Batal</button>
</div>
</div>

<!-- EDIT -->
<div id="editModal" class="modal">
<div class="card">
<h2>Edit Catatan</h2>
<input type="text" id="eJudul">
<textarea id="eIsi"></textarea>

<select id="eLevel">
<option value="1">Level 1 – Peaceful</option>
<option value="2">Level 2 – Happy</option>
<option value="3">Level 3 – Unsettled</option>
<option value="4">Level 4 – Sad</option>
<option value="5">Level 5 – Stressed</option>
<option value="6">Level 6 – Breakdown</option>
</select>

<select id="eKategori">
<option value="Love">💖 Love</option>
<option value="Family">👨‍👩‍👧 Family</option>
<option value="Self">🌱 Self</option>
<option value="Life">🌍 Life</option>
</select>

<button onclick="updateNote()">Update</button>
<button class="deleteBtn" onclick="deleteNote()">Hapus</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBxRNXTauqOB3X0FptQPeR7jkBy0gKUS3E",
authDomain:"emotion-74f3c.firebaseapp.com",
projectId:"emotion-74f3c",
storageBucket:"emotion-74f3c.firebasestorage.app",
messagingSenderId:"740825781548",
appId:"1:740825781548:web:90d4e448d440a953440889"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const PASSWORD="byblublia372";

const colors={
1:"#C8F7DC",
2:"#A8D8FF",
3:"#FFF3B0",
4:"#FFCC9A",
5:"#FF9E9E",
6:"#C3A6FF"
};

let bubbles=[];
let selectedId=null;
let editMode=false;
let createdDate=null;

window.toggleMenu=()=>menuBox.style.display=
menuBox.style.display==="flex"?"none":"flex";

function checkPass(){
return prompt("Masukkan password:")===PASSWORD;
}

window.openForm=()=>{if(!checkPass())return;formModal.style.display="flex";}
window.closeForm=()=>formModal.style.display="none";

window.saveNote=async()=>{
await addDoc(collection(db,"notes"),{
tanggal:new Date().toLocaleDateString(),
judul:judul.value,
isi:isi.value,
level:parseInt(level.value),
kategori:kategori.value
});
closeForm();
loadNotes();
};

window.enterEditMode=()=>{
if(!checkPass())return;
editMode=true;
alert("Klik bubble yang ingin diedit atau dihapus.");
};

window.updateNote=async()=>{
await updateDoc(doc(db,"notes",selectedId),{
judul:eJudul.value,
isi:eIsi.value,
level:parseInt(eLevel.value),
kategori:eKategori.value
});
editModal.style.display="none";
loadNotes();
};

window.deleteNote=async()=>{
await deleteDoc(doc(db,"notes",selectedId));
editModal.style.display="none";
loadNotes();
};

async function loadNotes(){
bubbles.forEach(b=>b.el.remove());
bubbles=[];
const snap=await getDocs(collection(db,"notes"));
snap.forEach(d=>createBubble(d.data(),d.id));
}

function createBubble(note,id){
let size=90+note.level*10;
let el=document.createElement("div");
el.className="bubble";
el.style.width=size+"px";
el.style.height=size+"px";
el.style.background=colors[note.level];
el.innerText=note.judul;
document.body.appendChild(el);

let bubble={
el,id,note,
x:Math.random()*(innerWidth-size),
y:Math.random()*(innerHeight-size),
dx:(Math.random()*2+1)*(Math.random()>.5?1:-1),
dy:(Math.random()*2+1)*(Math.random()>.5?1:-1),
size
};

el.style.left=bubble.x+"px";
el.style.top=bubble.y+"px";

el.onclick=()=>{
selectedId=id;
if(editMode){
eJudul.value=note.judul;
eIsi.value=note.isi;
eLevel.value=note.level;
eKategori.value=note.kategori;
editModal.style.display="flex";
editMode=false;
}
};

bubbles.push(bubble);
}

function animate(){
for(let b of bubbles){
b.x+=b.dx;b.y+=b.dy;
if(b.x<=0||b.x+b.size>=innerWidth)b.dx*=-1;
if(b.y<=0||b.y+b.size>=innerHeight)b.dy*=-1;
b.el.style.left=b.x+"px";
b.el.style.top=b.y+"px";
}
requestAnimationFrame(animate);
}

loadNotes();
animate();
</script>

</body>
</html>

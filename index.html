<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMOTION JOURNEY</title>
<style>
/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;font-family:'Poppins',sans-serif;overflow:hidden;}

/* 🌈 BACKGROUND GRADIENT PASTEL */
body{
  background:linear-gradient(-45deg,#fbc2eb,#a6c1ee,#fddb92,#c2ffd8);
  background-size:400% 400%;
  animation:gradientMove 18s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* HEADER TITLE */
.header{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  z-index:10;
}
.header h1{
  font-size:60px;
  font-weight:800;
  color:white;
  text-shadow:0 10px 30px rgba(0,0,0,0.3);
  letter-spacing:5px;
  animation:fadeTitle 1s ease;
}
@keyframes fadeTitle{
  from{opacity:0; transform:translateY(-30px);}
  to{opacity:1; transform:translateY(0);}
}

/* MENU BUTTON */
.menuButton{
  position:absolute;
  top:120px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 30px;
  border:none;
  border-radius:25px;
  font-size:16px;
  font-weight:600;
  background:rgba(255,255,255,0.9);
  color:#6366f1;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  transition:0.3s;
}
.menuButton:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

/* BUBBLE */
.bubble{
  position:absolute;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:15px;
  color:white;
  font-size:13px;
  backdrop-filter:blur(10px);
  box-shadow:0 15px 30px rgba(0,0,0,0.25);
  cursor:pointer;
  opacity:0.8;
  transition:transform 0.3s;
}
.bubble:hover{
  transform:scale(1.1);
}

/* MODAL DETAIL & FORM */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:20;
}
.modalCard{
  width:350px;
  padding:25px;
  border-radius:20px;
  color:white;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
  animation:fadeIn 0.3s ease;
}
@keyframes fadeIn{
  from{transform:scale(0.8);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
input,textarea,select{
  width:100%;
  margin-bottom:12px;
  padding:10px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:13px;
}
.modal button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}
.modal button:hover{transform:scale(1.05);}
</style>
</head>
<body>

<div class="header">
  <h1>EMOTION JOURNEY</h1>
</div>

<button class="menuButton" onclick="openMenu()">Menu</button>

<!-- MODAL TAMBAH / EDIT CATATAN -->
<div class="modal" id="formModal">
  <div class="modalCard" id="formCard" style="background:white;color:black;">
    <h3 id="formTitle">Tambah Catatan</h3>
    <input id="judul" placeholder="Judul">
    <textarea id="isi" placeholder="Isi catatan"></textarea>
    <select id="level">
      <option value="1">Peaceful</option>
      <option value="2">Happy</option>
      <option value="3">Unsettled</option>
      <option value="4">Sad</option>
      <option value="5">Stressed</option>
      <option value="6">Breakdown</option>
    </select>
    <select id="category">
      <option value="💖 Love">💖 Love</option>
      <option value="👨👩👧 Family">👨👩👧 Family</option>
      <option value="🌱 Self">🌱 Self</option>
      <option value="🌍 Life">🌍 Life</option>
    </select>
    <button onclick="saveNote()">Simpan</button>
    <button onclick="closeForm()">Batal</button>
  </div>
</div>

<!-- MODAL DETAIL CATATAN -->
<div class="modal" id="detailModal">
  <div class="modalCard" id="detailCard">
    <h3 id="detailTitle"></h3>
    <p id="detailDate"></p>
    <p id="detailIsi"></p>
    <p id="detailCategory"></p>
    <button onclick="editNote()">Edit</button>
    <button onclick="deleteNote()">Hapus</button>
    <button onclick="closeDetail()">Tutup</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ======= CONFIG FIREBASE ======= */
const firebaseConfig = {
  apiKey: "AIzaSyBxRNXTauqOB3X0FptQPeR7jkBy0gKUS3E",
  authDomain: "emotion-74f3c.firebaseapp.com",
  projectId: "emotion-74f3c",
  storageBucket: "emotion-74f3c.firebasestorage.app",
  messagingSenderId: "740825781548",
  appId: "1:740825781548:web:90d4e448d440a953440889",
  measurementId: "G-91KPTREBDS"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ======= VARIABEL ======= */
const PASSWORD="byblublia372";
const colors = {
1:"#C8F7DC", // Peaceful
2:"#A8D8FF", // Happy
3:"#FFF3B0", // Unsettled
4:"#FFCC9A", // Sad
5:"#FF9E9E", // Stressed
6:"#C3A6FF"  // Breakdown
};

let bubbles=[];
let currentId=null;
let editing=false;

/* ======= MENU ======= */
window.openMenu=()=>{
  const pass=prompt("Masukkan password:");
  if(pass!==PASSWORD) return alert("Password salah!");
  editing=false;
  document.getElementById("formTitle").innerText="Tambah Catatan";
  document.getElementById("formCard").style.background="white";
  document.getElementById("formCard").style.color="black";
  document.getElementById("formModal").style.display="flex";
}

/* ======= FORM ======= */
window.closeForm=()=>document.getElementById("formModal").style.display="none";
window.closeDetail=()=>document.getElementById("detailModal").style.display="none";

/* ======= SAVE CATATAN ======= */
window.saveNote=async()=>{
  const judul=document.getElementById("judul").value;
  const isi=document.getElementById("isi").value;
  const level=parseInt(document.getElementById("level").value);
  const category=document.getElementById("category").value;

  if(!judul||!isi) return alert("Lengkapi data!");

  if(editing){
    await updateDoc(doc(db,"notes",currentId),{judul,isi,level,category});
  } else{
    await addDoc(collection(db,"notes"),{
      judul,isi,level,category,
      date:new Date().toLocaleDateString("id-ID")
    });
  }
  closeForm();
  loadNotes();
}

/* ======= LOAD NOTES ======= */
async function loadNotes(){
  // hapus bubble lama
  bubbles.forEach(b=>b.el.remove());
  bubbles=[];
  const snap = await getDocs(collection(db,"notes"));
  snap.forEach(d=>{
    createBubble(d.data(),d.id);
  });
}

/* ======= CREATE BUBBLE ======= */
function createBubble(note,id){
  const size=100+note.level*10;
  const el=document.createElement("div");
  el.className="bubble";
  el.style.width=size+"px";
  el.style.height=size+"px";
  el.style.background=colors[note.level];
  el.style.color="#000";
  el.innerHTML=`<b>${note.judul}</b>`;
  document.body.appendChild(el);

  const bubble={
    el,id,note,
    x:Math.random()*(innerWidth-size),
    y:Math.random()*(innerHeight-size),
    dx:(Math.random()*2+1)*(Math.random()>0.5?1:-1),
    dy:(Math.random()*2+1)*(Math.random()>0.5?1:-1),
    size
  };

  el.style.left=bubble.x+"px";
  el.style.top=bubble.y+"px";

  el.addEventListener("click",()=>{
    currentId=id;
    document.getElementById("detailTitle").innerText=note.judul;
    document.getElementById("detailDate").innerText="Tanggal: "+note.date;
    document.getElementById("detailIsi").innerText=note.isi;
    document.getElementById("detailCategory").innerText="Kategori: "+note.category;
    document.getElementById("detailCard").style.background=colors[note.level];
    document.getElementById("detailModal").style.display="flex";
  });

  bubbles.push(bubble);
}

/* ======= EDIT ======= */
window.editNote=async()=>{
  const pass=prompt("Masukkan password:");
  if(pass!==PASSWORD) return alert("Password salah!");
  editing=true;
  document.getElementById("formTitle").innerText="Edit Catatan";
  document.getElementById("formCard").style.background=colors[bubbles.find(b=>b.id===currentId).note.level];
  document.getElementById("formCard").style.color="#000";
  const note = bubbles.find(b=>b.id===currentId).note;
  document.getElementById("judul").value=note.judul;
  document.getElementById("isi").value=note.isi;
  document.getElementById("level").value=note.level;
  document.getElementById("category").value=note.category;
  closeDetail();
  document.getElementById("formModal").style.display="flex";
}

/* ======= DELETE ======= */
window.deleteNote=async()=>{
  const pass=prompt("Masukkan password:");
  if(pass!==PASSWORD) return alert("Password salah!");
  await deleteDoc(doc(db,"notes",currentId));
  closeDetail();
  loadNotes();
}

/* ======= PHYSICS ======= */
function animate(){
  for(let i=0;i<bubbles.length;i++){
    let b=bubbles[i];
    b.x+=b.dx;
    b.y+=b.dy;

    // dinding
    if(b.x<=0||b.x+b.size>=innerWidth) b.dx*=-1;
    if(b.y<=0||b.y+b.size>=innerHeight) b.dy*=-1;

    // collision antar bubble
    for(let j=i+1;j<bubbles.length;j++){
      let b2=bubbles[j];
      let dx=b.x-b2.x;
      let dy=b.y-b2.y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<b.size/2+b2.size/2){
        [b.dx,b2.dx]=[b2.dx,b.dx];
        [b.dy,b2.dy]=[b2.dy,b.dy];
      }
    }

    b.el.style.left=b.x+"px";
    b.el.style.top=b.y+"px";
  }
  requestAnimationFrame(animate);
}

/* ======= INIT ======= */
loadNotes();
animate();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY FEELING</title>

<style>

body{
  margin:0;
  overflow:hidden;
  font-family:'Poppins',sans-serif;
  animation:gradientMove 15s ease infinite;
  background:linear-gradient(-45deg,#fbc2eb,#a6c1ee,#fddb92,#c2ffd8);
  background-size:400% 400%;
}

/* 🌈 Gradient Animation */
@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* 🌸 HEADER CENTER */
.header{
  position:fixed;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  z-index:10;
}

/* ✨ JUDUL DINAMIS */
.header h1{
  margin:0;
  font-size:48px;
  letter-spacing:4px;
  font-weight:700;
  background:linear-gradient(90deg,#ffffff,#fdfbfb);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:fadeTitle 1.5s ease;
  text-shadow:0 10px 30px rgba(0,0,0,0.15);
}

@keyframes fadeTitle{
  from{opacity:0; transform:translateY(-20px);}
  to{opacity:1; transform:translateY(0);}
}

/* 🌼 BUTTON AESTHETIC */
.header button{
  margin-top:20px;
  padding:10px 28px;
  border-radius:30px;
  font-size:14px;
  background:linear-gradient(135deg,#a18cd1,#fbc2eb);
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  transition:0.3s;
}

.header button:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 15px 30px rgba(0,0,0,0.25);
}

/* 🫧 BUBBLE TRANSPARAN */
.bubble{
  position:absolute;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:15px;
  box-sizing:border-box;
  color:white;
  font-size:12px;
  backdrop-filter:blur(10px);
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
  cursor:pointer;
  opacity:0.75;
  transition:transform 0.3s;
}

.bubble:hover{
  transform:scale(1.1);
}

</style>
</head>
<body>

<div class="header">
  <h1>MY FEELING</h1>
  <button onclick="openAdd()">Tambah Catatan</button>
</div>

<!-- DETAIL MODAL -->
<div class="detailModal" id="detailModal">
  <div class="detailCard" id="detailCard">
    <h3 id="detailTitle"></h3>
    <p id="detailDate"></p>
    <p id="detailIsi"></p>
    <br>
    <button onclick="editNote()">Edit</button>
    <button onclick="deleteNote()">Hapus</button>
    <button onclick="closeDetail()">Tutup</button>
  </div>
</div>

<!-- FORM MODAL -->
<div class="formModal" id="formModal">
  <div class="formCard">
    <h3 id="formTitle">Tambah Catatan</h3>
    <input id="judul" placeholder="Judul">
    <textarea id="isi" placeholder="Isi"></textarea>
    <select id="level">
      <option value="1">Ringan</option>
      <option value="2">Sedang</option>
      <option value="3">Berat</option>
      <option value="4">Sangat Berat</option>
    </select>
    <button onclick="saveNote()">Simpan</button>
    <button onclick="closeForm()">Batal</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const PASSWORD="deadline";

const firebaseConfig={
  apiKey:"ISI_API_KEY_KAMU",
  authDomain:"emotion-74f3c.firebaseapp.com",
  projectId:"emotion-74f3c",
  storageBucket:"emotion-74f3c.firebasestorage.app",
  messagingSenderId:"740825781548",
  appId:"1:740825781548:web:90d4e448d440a953440889"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const colors={
1:"linear-gradient(135deg,#60a5fa,#3b82f6)",
2:"linear-gradient(135deg,#34d399,#10b981)",
3:"linear-gradient(135deg,#fbbf24,#f59e0b)",
4:"linear-gradient(135deg,#f87171,#ef4444)"
};

let bubbles=[];
let currentId=null;
let editing=false;

/* OPEN ADD */
window.openAdd=()=>{
  const pass=prompt("Masukkan password:");
  if(pass!==PASSWORD) return alert("Password salah!");
  editing=false;
  document.getElementById("formTitle").innerText="Tambah Catatan";
  document.getElementById("formModal").style.display="flex";
}

window.closeForm=()=>{
  document.getElementById("formModal").style.display="none";
}

/* SAVE */
window.saveNote=async()=>{
const judul=document.getElementById("judul").value;
const isi=document.getElementById("isi").value;
const level=parseInt(document.getElementById("level").value);

if(editing){
  await updateDoc(doc(db,"notes",currentId),{judul,isi,level});
}else{
  await addDoc(collection(db,"notes"),{
    judul,isi,level,
    date:new Date().toLocaleDateString("id-ID")
  });
}
closeForm();
loadNotes();
};

/* LOAD */
async function loadNotes(){
bubbles.forEach(b=>b.el.remove());
bubbles=[];
const snap=await getDocs(collection(db,"notes"));
snap.forEach(d=>createBubble(d.data(),d.id));
}

/* CREATE BUBBLE */
function createBubble(note,id){
const size=100+note.level*15;
const el=document.createElement("div");
el.className="bubble";
el.style.width=size+"px";
el.style.height=size+"px";
el.style.background=colors[note.level];
el.innerHTML=`<b>${note.judul}</b>`;
document.body.appendChild(el);

const bubble={
el,id,note,
x:Math.random()*(innerWidth-size),
y:Math.random()*(innerHeight-size),
dx:(Math.random()*3+1)*(Math.random()>0.5?1:-1),
dy:(Math.random()*3+1)*(Math.random()>0.5?1:-1),
size
};

el.style.left=bubble.x+"px";
el.style.top=bubble.y+"px";

el.addEventListener("click",()=>{
  currentId=id;
  document.getElementById("detailTitle").innerText=note.judul;
  document.getElementById("detailDate").innerText=note.date;
  document.getElementById("detailIsi").innerText=note.isi;
  document.getElementById("detailCard").style.background=colors[note.level];
  document.getElementById("detailModal").style.display="flex";
});

bubbles.push(bubble);
}

window.closeDetail=()=>{
  document.getElementById("detailModal").style.display="none";
}

/* EDIT */
window.editNote=()=>{
  const pass=prompt("Masukkan password:");
  if(pass!==PASSWORD) return alert("Password salah!");
  editing=true;
  document.getElementById("formTitle").innerText="Edit Catatan";
  document.getElementById("formModal").style.display="flex";
  closeDetail();
}

/* DELETE */
window.deleteNote=async()=>{
  const pass=prompt("Masukkan password:");
  if(pass!==PASSWORD) return alert("Password salah!");
  await deleteDoc(doc(db,"notes",currentId));
  closeDetail();
  loadNotes();
}

/* PHYSICS */
function animate(){
for(let i=0;i<bubbles.length;i++){
let b=bubbles[i];
b.x+=b.dx;
b.y+=b.dy;

if(b.x<=0||b.x+b.size>=innerWidth) b.dx*=-1;
if(b.y<=0||b.y+b.size>=innerHeight) b.dy*=-1;

for(let j=i+1;j<bubbles.length;j++){
let b2=bubbles[j];
let dx=b.x-b2.x;
let dy=b.y-b2.y;
let distance=Math.sqrt(dx*dx+dy*dy);
if(distance<b.size/2+b2.size/2){
[b.dx,b2.dx]=[b2.dx,b.dx];
[b.dy,b2.dy]=[b2.dy,b.dy];
}
}

b.el.style.left=b.x+"px";
b.el.style.top=b.y+"px";
}
requestAnimationFrame(animate);
}

loadNotes();
animate();

</script>
</body>
</html>

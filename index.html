<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Peta Emosi Online</title>
<style>
body{font-family:sans-serif;margin:0;overflow:hidden;background:#f4f4f4}
button{padding:8px 12px;margin:5px;border-radius:8px;border:none;cursor:pointer}
.bubble{
position:absolute;
border-radius:50%;
color:white;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
font-size:12px;
}
</style>
</head>
<body>

<button onclick="openAdd()">Tambah Catatan</button>

<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;">
<div style="background:white;padding:20px;border-radius:12px;width:300px;">
<h3>Tambah Catatan</h3>
<input id="judul" placeholder="Judul"><br><br>
<textarea id="isi" placeholder="Isi"></textarea><br><br>
<select id="level">
<option value="1">Emosi Internal</option>
<option value="2">Lelah & Stres</option>
<option value="3">Emosi Sosial</option>
<option value="4">Sangat Berat</option>
</select><br><br>
<button onclick="saveNote()">Simpan</button>
<button onclick="closeModal()">Batal</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 CONFIG FIREBASE YULIA */
const firebaseConfig = {
  apiKey: "AIzaSyBxRNXTauqOB3X0FptQPeR7jkBy0gKUS3E",
  authDomain: "emotion-74f3c.firebaseapp.com",
  projectId: "emotion-74f3c",
  storageBucket: "emotion-74f3c.firebasestorage.app",
  messagingSenderId: "740825781548",
  appId: "1:740825781548:web:90d4e448d440a953440889",
  measurementId: "G-91KPTREBDS"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const emotionColors = {
1:"#4cc9f0",
2:"#80ed99",
3:"#f9c74f",
4:"#f94144"
};

let bubbles=[];

/* Modal */
window.openAdd=function(){
document.getElementById("modal").style.display="flex";
}

window.closeModal=function(){
document.getElementById("modal").style.display="none";
}

/* Simpan ke Firestore */
window.saveNote=async function(){
const judul=document.getElementById("judul").value;
const isi=document.getElementById("isi").value;
const level=parseInt(document.getElementById("level").value);

if(!judul||!isi)return alert("Lengkapi data");

await addDoc(collection(db,"notes"),{
judul,
isi,
level,
date:new Date().toLocaleDateString("id-ID"),
timestamp:Date.now()
});

closeModal();
loadNotes();
}

/* Ambil dari Firestore */
async function loadNotes(){
bubbles.forEach(b=>b.remove());
bubbles=[];

const querySnapshot=await getDocs(collection(db,"notes"));

querySnapshot.forEach((doc)=>{
const note=doc.data();
createBubble(note);
});
}

/* Bubble */
function createBubble(note){
const bubble=document.createElement("div");
bubble.className="bubble";
bubble.style.background=emotionColors[note.level];

const size=100+note.level*15;
bubble.style.width=size+"px";
bubble.style.height=size+"px";

bubble.innerHTML=`<div>${note.date}<br><b>${note.judul}</b></div>`;

bubble.style.left=Math.random()*(window.innerWidth-size)+"px";
bubble.style.top=Math.random()*(window.innerHeight-size)+"px";

document.body.appendChild(bubble);
bubbles.push(bubble);
}

loadNotes();

</script>

</body>
</html>
